{% extends 'base.html' %}

{% block titulo %}
HomeFilmes Hashflix
{% endblock %}

{% block content %}
<div class="py-10">
    <h1>Essa é a nossa homefilmes</h1>
    {% for filme in object_list %}
    <hr>
    <a href="{% url 'filme:detalhesfilme' filme.id %}"><p>{{ filme.titulo }}</p></a>
    <p>{{ filme.descricao }}</p>
    <img src="{{ filme.thumb.url }}" alt="">
    {% endfor %}
</div>

{% endblock %}
